name: Update feeds

# Daily at 11:00 UTC (~5–6am Mountain), plus a manual "Run workflow" button
# on the Actions tab so you can trigger it from the GitHub dashboard anytime.
#
# NOTE: scheduled (cron) runs only fire on the repo's DEFAULT branch, and
# GitHub auto-disables cron on public repos after ~60 days without commits —
# it emails you first, and one click re-enables it.
on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch: {}

# Required so the default GITHUB_TOKEN can push the updated feeds.json.
permissions:
  contents: write

jobs:
  build-feeds:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install feedparser
        run: pip install feedparser

      - name: Build feeds.json
        run: python scripts/build_feeds.py

      - name: Commit feeds.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feeds.json
          if git diff --cached --quiet; then
            echo "No feed changes — nothing to commit."
          else
            git commit -m "Update feeds.json [skip ci]"
            git push
          fi
